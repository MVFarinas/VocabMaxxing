ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ com.vocabmaxxing.ApplicationKt.module ]
    }
}

database {
    url = "jdbc:postgresql://localhost:5432/vocabmaxxing"
    url = ${?DATABASE_URL}
    driver = "org.postgresql.Driver"
    user = "postgres"
    user = ${?DATABASE_USER}
    password = "password"
    password = ${?DATABASE_PASSWORD}
}

jwt {
    secret = "vocabmaxxing-jwt-secret-change-in-production"
    secret = ${?JWT_SECRET}
    issuer = "vocabmaxxing"
    audience = "vocabmaxxing-app"
    realm = "VocabMaxxing"
}

openai {
    apiKey = ""
    apiKey = ${?OPENAI_API_KEY}
}
